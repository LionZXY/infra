apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  acme:
    email: {{ .Values.issuer.email | quote }}
    server: {{ .Values.issuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.issuer.name }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.issuer.ingressClass | quote }}