apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "transfersh.fullname" . }}-minio
spec:
  serviceName: {{ include "transfersh.fullname" . }}-minio
  replicas: {{ .Values.minio.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "transfersh.fullname" . }}-minio
  template:
    metadata:
      labels:
        app: {{ include "transfersh.fullname" . }}-minio
    spec:
      containers:
        - name: minio
          image: "{{ .Values.image.minio.repository }}:{{ .Values.image.minio.tag }}"
          args: [ "server", "/storage/" ]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "transfersh.fullname" . }}-minio
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "transfersh.fullname" . }}-minio
                  key: secretkey 
          ports:
            - containerPort: {{ .Values.minio.service.port }}
              name: s3
          volumeMounts:
            - mountPath: "/storage"
              name: minio-storage
  volumeClaimTemplates:
    - metadata:
        name: minio-storage
      spec:
        accessModes:
          - {{ .Values.minio.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
