apiVersion: v1
kind: Service
metadata:
  name: {{ include "transfersh.fullname" . }}-minio
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ include "transfersh.fullname" . }}-minio
  ports:
    - name: api
      port: {{ .Values.minio.service.port }}
      targetPort: {{ .Values.minio.service.port }}
